<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cantina do Terceirão 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
--primary:#2563EB;
--primary-dark:#1E40AF;
--danger:#EF4444;
--success:#10B981;
--warning:#F59E0B;
--bg:#F1F5F9;
--surface:#FFFFFF;
--text:#0F172A;
--text-light:#64748B;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Inter',sans-serif;
background:var(--bg);
padding-bottom:100px;
}

header{
background:linear-gradient(135deg,var(--primary-dark),var(--primary));
color:white;
padding:25px 20px;
border-radius:0 0 25px 25px;
text-align:center;
}

nav{
display:flex;
justify-content:center;
gap:10px;
margin-top:15px;
}

nav button{
background:white;
color:var(--primary);
border:none;
padding:8px 18px;
border-radius:20px;
font-weight:600;
cursor:pointer;
}

nav button.active{
background:var(--primary);
color:white;
}

.container{
max-width:650px;
margin:20px auto;
padding:15px;
}

.card{
background:var(--surface);
padding:20px;
border-radius:18px;
box-shadow:0 8px 20px rgba(0,0,0,0.05);
margin-bottom:18px;
}

h2{
font-size:18px;
margin-bottom:15px;
}

label{
font-size:14px;
color:var(--text-light);
display:block;
margin-bottom:5px;
}

input,select{
width:100%;
padding:12px;
margin-bottom:12px;
border-radius:12px;
border:2px solid #E2E8F0;
font-size:14px;
}

button{
padding:10px 14px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:600;
}

.btn-primary{
background:var(--primary);
color:white;
width:100%;
}

.btn-success{
background:var(--success);
color:white;
margin-top:8px;
}

.btn-danger{
background:#FEE2E2;
color:var(--danger);
}

.sale{
background:#F8FAFC;
padding:15px;
border-radius:15px;
margin-bottom:12px;
border-left:5px solid var(--primary);
}

.vencido{color:var(--danger);font-weight:600;}
.fiado{color:var(--warning);font-weight:600;}

.footer{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
padding:18px;
box-shadow:0 -6px 20px rgba(0,0,0,0.08);
display:flex;
justify-content:space-between;
align-items:center;
}

.total{
font-size:18px;
font-weight:700;
color:var(--primary);
}
</style>
</head>

<body>

<header>
<h1> Cantina do Terceirão 2026</h1>
<p>Controle de Vendas</p>

<nav>
<button onclick="mostrarTela('vendas')" id="btnVendas" class="active">Vendas</button>
<button onclick="mostrarTela('relatorios')" id="btnRelatorios">Relatórios</button>
</nav>

</header>

<!-- TELA VENDAS -->
<div id="telaVendas">

<div class="container">

<div class="card">
<h2>Nova Venda</h2>

<label>Data</label>
<input type="date" id="dataVenda">

<label>Cliente</label>
<input type="text" id="nome">

<label>Produto</label>
<select id="produto">
<option value="0">Selecione...</option>

<optgroup label="🥤 Bebidas">
<option value="3.50">Refrigerante - R$3,50</option>
<option value="2.00">Suco de caixinha - R$2,00</option>
</optgroup>

<optgroup label="🍩 Doces">
<option value="2.50">Freegells - R$2,50</option>
<option value="1.50">Pirulito - R$0,75</option>
<option value="3.00">Bala azedinha - R$0,50</option>
<option value="3.00">Bala 7 Belo - R$0,50</option>
<option value="3.00">Trufas - R$0,50</option>
<option value="3.00">Geladinho - R$1,00</option>

</optgroup>

<optgroup label="🍟 Salgados Fritos">
<option value="6.00">Coxinha - R$6,00</option>
<option value="5.00">Salsicha - R$6,00</option>
<option value="4.50">Presunto e Queijo - R$6,00</option>
</optgroup>

<optgroup label="🥨 Industrializados">
<option value="2.50">Pipoca Vovozinha - R$1,50</option>
<option value="2.00">Fofura - R$3,50</option>
</optgroup>
</select>

<label>Forma de Pagamento</label>
<select id="forma">
<option value="avista">Dinheiro</option>
<option value="pix">Cartão</option>
<option value="pix">Pix</option>
<option value="fiado">Fiado (14 dias)</option>
</select>

<button class="btn-primary" onclick="registrarVenda()">Registrar Venda</button>
</div>

<div class="card">
<h2>Vendas do Dia</h2>
<div id="lista"></div>
</div>

</div>

</div>

<!-- TELA RELATÓRIOS -->
<div id="telaRelatorios" style="display:none;">
<div class="container">

<div class="card">
<h2>📅 Registro por Dia</h2>
<div id="relatorioDias"></div>
</div>

<div class="card">
<h2>📊 Total Geral Recebido</h2>
<div id="relatorioGeral"></div>
</div>

</div>
</div>

<div class="footer">
<div class="total" id="totalDia">R$ 0,00</div>
<button class="btn-danger" onclick="limparDia()">Limpar Dia</button>
</div>

<script>

document.getElementById("dataVenda").value =
new Date().toISOString().split("T")[0];

function mostrarTela(tela){
document.getElementById("telaVendas").style.display = tela=="vendas" ? "block":"none";
document.getElementById("telaRelatorios").style.display = tela=="relatorios" ? "block":"none";

document.getElementById("btnVendas").classList.toggle("active",tela=="vendas");
document.getElementById("btnRelatorios").classList.toggle("active",tela=="relatorios");

if(tela=="relatorios"){
gerarRelatorio();
}
}

function registrarVenda(){
let data=document.getElementById("dataVenda").value;
let nome=document.getElementById("nome").value.trim();
let produto=document.getElementById("produto");
let produtoNome=produto.options[produto.selectedIndex].text;
let valor=parseFloat(produto.value);
let forma=document.getElementById("forma").value;

if(!nome || valor==0){
alert("Preencha corretamente!");
return;
}

let vencimento=null;
if(forma=="fiado"){
let d=new Date(data);
d.setDate(d.getDate()+14);
vencimento=d.toISOString();
}

let venda={data,nome,produto:produtoNome,valor,forma,vencimento,pago:false};

let vendas=JSON.parse(localStorage.getItem("vendas")||"[]");
vendas.push(venda);
localStorage.setItem("vendas",JSON.stringify(vendas));

document.getElementById("nome").value="";
document.getElementById("produto").value="0";

carregar();
}

function carregar(){
let lista=document.getElementById("lista");
lista.innerHTML="";
let total=0;
let dataSelecionada=document.getElementById("dataVenda").value;
let vendas=JSON.parse(localStorage.getItem("vendas")||"[]");

vendas.forEach((v,i)=>{
if(v.data==dataSelecionada){

let status="";
if(v.forma=="fiado" && !v.pago){
let hoje=new Date();
let venc=new Date(v.vencimento);

if(hoje>venc){
status="<div class='vencido'>⚠️ FIADO VENCIDO</div>";
}else{
status="<div class='fiado'>Fiado até "+venc.toLocaleDateString("pt-BR")+"</div>";
}
}

if(v.pago){
status="<div style='margin-top:5px;'><span style='background:#10B981;color:white;padding:4px 12px;border-radius:20px;font-size:12px;'>✔ PAGO</span></div>";
total+=v.valor;
}else if(v.forma=="avista" || v.forma=="pix"){
total+=v.valor;
}

lista.innerHTML+=`
<div class="sale">
<strong>${v.nome}</strong><br>
<small>${v.produto}</small><br>
<small>Pagamento: ${v.forma.toUpperCase()}</small><br>
${status}
<br>
<strong>R$ ${v.valor.toFixed(2)}</strong>
${v.forma=="fiado" && !v.pago ? `<br><button class="btn-success" onclick="marcarPago(${i})">Marcar como Pago</button>`:""}
</div>
`;
}
});

document.getElementById("totalDia").innerText="R$ "+total.toFixed(2);
}

function marcarPago(i){
let vendas=JSON.parse(localStorage.getItem("vendas")||"[]");
vendas[i].pago=true;
localStorage.setItem("vendas",JSON.stringify(vendas));
carregar();
}

function limparDia(){
let dataSelecionada=document.getElementById("dataVenda").value;
if(confirm("Deseja limpar as vendas desse dia?")){
let vendas=JSON.parse(localStorage.getItem("vendas")||"[]");
vendas=vendas.filter(v=>v.data!=dataSelecionada);
localStorage.setItem("vendas",JSON.stringify(vendas));
carregar();
}
}

function gerarRelatorio(){
let vendas=JSON.parse(localStorage.getItem("vendas")||"[]");
let dias={};
let totalGeral=0;

vendas.forEach(v=>{
if(v.pago || v.forma=="avista" || v.forma=="pix"){
if(!dias[v.data]) dias[v.data]=0;
dias[v.data]+=v.valor;
totalGeral+=v.valor;
}
});

let html="";
for(let dia in dias){
html+=`<div style="margin-bottom:8px;"><strong>${dia}</strong> - R$ ${dias[dia].toFixed(2)}</div>`;
}

document.getElementById("relatorioDias").innerHTML=html||"Nenhum registro.";
document.getElementById("relatorioGeral").innerHTML="<strong>R$ "+totalGeral.toFixed(2)+"</strong>";
}

document.getElementById("dataVenda").addEventListener("change",carregar);

carregar();

</script>

</body>
</html>
