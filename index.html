<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cantina do Terceirão 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
--primary:#2563EB;
--primary-dark:#1E40AF;
--danger:#EF4444;
--success:#10B981;
--warning:#F59E0B;
--bg:#F1F5F9;
--surface:#FFFFFF;
--text:#0F172A;
--text-light:#64748B;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Inter',sans-serif;
background:var(--bg);
padding-bottom:120px;
}

header{
background:linear-gradient(135deg,var(--primary-dark),var(--primary));
color:white;
padding:25px 20px;
border-radius:0 0 25px 25px;
text-align:center;
}

nav{
display:flex;
justify-content:center;
gap:10px;
margin-top:15px;
}

nav button{
background:white;
color:var(--primary);
border:none;
padding:8px 18px;
border-radius:20px;
font-weight:600;
cursor:pointer;
}

nav button.active{
background:var(--primary);
color:white;
}

.container{
max-width:650px;
margin:20px auto;
padding:15px;
}

.card{
background:var(--surface);
padding:20px;
border-radius:18px;
box-shadow:0 8px 20px rgba(0,0,0,0.05);
margin-bottom:18px;
}

label{
font-size:14px;
color:var(--text-light);
display:block;
margin-bottom:5px;
}

input,select{
width:100%;
padding:12px;
margin-bottom:12px;
border-radius:12px;
border:2px solid #E2E8F0;
font-size:14px;
}

button{
padding:10px 14px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:600;
}

.btn-primary{
background:var(--primary);
color:white;
width:100%;
}

.btn-success{
background:var(--success);
color:white;
margin-top:8px;
}

.btn-danger{
background:#FEE2E2;
color:var(--danger);
}

.sale{
background:#F8FAFC;
padding:15px;
border-radius:15px;
margin-bottom:12px;
border-left:5px solid var(--primary);
}

.vencido{color:var(--danger);font-weight:600;}
.fiado{color:var(--warning);font-weight:600;}

.footer{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
padding:18px;
box-shadow:0 -6px 20px rgba(0,0,0,0.08);
display:flex;
justify-content:space-between;
align-items:center;
}

.total{
font-size:18px;
font-weight:700;
color:var(--primary);
}
</style>
</head>

<body>

<header>
<h1>Cantina do Terceirão 2026</h1>
<p>Controle de Vendas</p>

<nav>
<button onclick="mostrarTela('vendas')" id="btnVendas" class="active">Vendas</button>
<button onclick="mostrarTela('relatorios')" id="btnRelatorios">Relatórios</button>
</nav>
</header>

<!-- TELA VENDAS -->
<div id="telaVendas">
<div class="container">

<div class="card">
<h2>Nova Venda</h2>

<label>Data</label>
<input type="date" id="dataVenda">

<label>Cliente</label>
<div style="display:flex; gap:8px;">
<input type="text" id="nome" placeholder="Nome do cliente">
<select id="sala" style="max-width:100px;">
<option value="">Sala</option>
<option>1W</option><option>2W</option><option>3W</option>
<option>1X</option><option>2X</option><option>3X</option>
<option>1Y</option><option>2Y</option><option>3Y</option>
</select>
</div>

<label>Produto</label>
<select id="produto">
<option value="0">Selecione...</option>
<optgroup label="🥤 Bebidas">
<option value="3.50">Refrigerante - R$3,50</option>
<option value="2.00">Suco - R$2,00</option>
</optgroup>
<optgroup label="🍩 Doces">
<option value="2.50">Freegells - R$2,50</option>
<option value="0.75">Pirulito - R$0,75</option>
<option value="0.50">Bala - R$0,50</option>
</optgroup>
<optgroup label="🍟 Salgados Fritos">
<option value="6.00">Coxinha - R$6,00</option>
<option value="6.00">Salsicha - R$6,00</option>
</optgroup>
<optgroup label="🥨 Industrializados">
<option value="1.50">Pipoca - R$1,50</option>
<option value="3.50">Fofura - R$3,50</option>
</optgroup>
</select>

<label>Forma de Pagamento</label>
<select id="forma">
<option value="avista">Dinheiro</option>
<option value="pix">Pix</option>
<option value="cartao">Cartão</option>
<option value="fiado">Fiado (14 dias)</option>
</select>

<button class="btn-primary" onclick="registrarVenda()">Registrar Venda</button>
</div>

<div class="card">
<h2>Vendas do Dia</h2>
<div id="lista"></div>
</div>

</div>
</div>

<!-- TELA RELATÓRIOS -->
<div id="telaRelatorios" style="display:none;">
<div class="container">

<div class="card">
<h2>📅 Total por Dia</h2>
<div id="relatorioDias"></div>
</div>

<div class="card">
<h2>🏫 Total por Sala</h2>
<div id="relatorioSala"></div>
</div>

<div class="card">
<h2>🏆 Ranking de Salas</h2>
<div id="rankingSala"></div>
</div>

<div class="card">
<h2>💰 Total Geral</h2>
<div id="relatorioGeral"></div>
</div>

</div>
</div>

<div class="footer">
<div class="total" id="totalDia">R$ 0,00</div>
<button class="btn-danger" onclick="limparDia()">Limpar Dia</button>
</div>

<script>

document.getElementById("dataVenda").value =
new Date().toISOString().split("T")[0];

function mostrarTela(tela){
document.getElementById("telaVendas").style.display = tela=="vendas"?"block":"none";
document.getElementById("telaRelatorios").style.display = tela=="relatorios"?"block":"none";
document.getElementById("btnVendas").classList.toggle("active",tela=="vendas");
document.getElementById("btnRelatorios").classList.toggle("active",tela=="relatorios");
if(tela=="relatorios") gerarRelatorio();
}

function registrarVenda(){
let data=dataVenda.value;
let nome=nome.value.trim();
let sala=document.getElementById("sala").value;
let produto=document.getElementById("produto");
let produtoNome=produto.options[produto.selectedIndex].text;
let valor=parseFloat(produto.value);
let forma=document.getElementById("forma").value;

if(!nome || !sala || valor==0){
alert("Preencha nome, sala e produto!");
return;
}

let vencimento=null;
if(forma=="fiado"){
let d=new Date(data);
d.setDate(d.getDate()+14);
vencimento=d.toISOString();
}

let venda={data,nome,sala,produto:produtoNome,valor,forma,vencimento,pago:false};
let vendas=JSON.parse(localStorage.getItem("vendas")||"[]");
vendas.push(venda);
localStorage.setItem("vendas",JSON.stringify(vendas));

document.getElementById("nome").value="";
carregar();
}

function carregar(){
let lista=document.getElementById("lista");
lista.innerHTML="";
let total=0;
let dataSelecionada=dataVenda.value;
let vendas=JSON.parse(localStorage.getItem("vendas")||"[]");

vendas.forEach((v,i)=>{
if(v.data==dataSelecionada){
if(v.pago || v.forma!="fiado") total+=v.valor;

lista.innerHTML+=`
<div class="sale">
<strong>${v.nome} - ${v.sala}</strong><br>
<small>${v.produto}</small><br>
<small>Pagamento: ${v.forma.toUpperCase()}</small><br>
<strong>R$ ${v.valor.toFixed(2)}</strong>
${v.forma=="fiado" && !v.pago ? `<br><button class="btn-success" onclick="marcarPago(${i})">Marcar como Pago</button>`:""}
</div>`;
}
});

totalDia.innerText="R$ "+total.toFixed(2);
}

function marcarPago(i){
let vendas=JSON.parse(localStorage.getItem("vendas")||"[]");
vendas[i].pago=true;
localStorage.setItem("vendas",JSON.stringify(vendas));
carregar();
}

function limparDia(){
let dataSelecionada=dataVenda.value;
if(confirm("Deseja limpar esse dia?")){
let vendas=JSON.parse(localStorage.getItem("vendas")||"[]");
vendas=vendas.filter(v=>v.data!=dataSelecionada);
localStorage.setItem("vendas",JSON.stringify(vendas));
carregar();
}
}

function gerarRelatorio(){
let vendas=JSON.parse(localStorage.getItem("vendas")||"[]");
let dias={}, salas={}, totalGeral=0;

vendas.forEach(v=>{
if(v.pago || v.forma!="fiado"){
if(!dias[v.data]) dias[v.data]=0;
if(!salas[v.sala]) salas[v.sala]=0;
dias[v.data]+=v.valor;
salas[v.sala]+=v.valor;
totalGeral+=v.valor;
}
});

let htmlDias="";
for(let d in dias){
htmlDias+=`<div>${d} - R$ ${dias[d].toFixed(2)}</div>`;
}

let htmlSala="";
for(let s in salas){
htmlSala+=`<div>${s} - R$ ${salas[s].toFixed(2)}</div>`;
}

let ranking=Object.entries(salas).sort((a,b)=>b[1]-a[1]);
let htmlRanking="";
ranking.forEach((r,i)=>{
htmlRanking+=`<div>${i+1}º ${r[0]} - R$ ${r[1].toFixed(2)}</div>`;
});

relatorioDias.innerHTML=htmlDias||"Nenhum registro.";
relatorioSala.innerHTML=htmlSala||"Nenhum registro.";
rankingSala.innerHTML=htmlRanking||"Nenhum registro.";
relatorioGeral.innerHTML="<strong>R$ "+totalGeral.toFixed(2)+"</strong>";
}

dataVenda.addEventListener("change",carregar);
carregar();

</script>

</body>
</html>
