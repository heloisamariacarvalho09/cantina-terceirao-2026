<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cantina do Terceirão 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
--primary:#2563EB;
--primary-dark:#1E40AF;
--danger:#EF4444;
--success:#10B981;
--bg:#F1F5F9;
--surface:#FFFFFF;
--text:#0F172A;
--text-light:#64748B;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Inter',sans-serif;
background:var(--bg);
padding-bottom:120px;
}

header{
background:linear-gradient(135deg,var(--primary-dark),var(--primary));
color:white;
padding:25px 20px;
border-radius:0 0 25px 25px;
text-align:center;
}

nav{
display:flex;
justify-content:center;
gap:10px;
margin-top:15px;
}

nav button{
background:white;
color:var(--primary);
border:none;
padding:8px 18px;
border-radius:20px;
font-weight:600;
cursor:pointer;
}

nav button.active{
background:var(--primary);
color:white;
}

.container{
max-width:650px;
margin:20px auto;
padding:15px;
}

.card{
background:var(--surface);
padding:20px;
border-radius:18px;
box-shadow:0 8px 20px rgba(0,0,0,0.05);
margin-bottom:18px;
}

label{
font-size:14px;
color:var(--text-light);
display:block;
margin-bottom:5px;
}

input,select{
width:100%;
padding:12px;
margin-bottom:12px;
border-radius:12px;
border:2px solid #E2E8F0;
font-size:14px;
}

.flex{
display:flex;
gap:8px;
}

button{
padding:10px 14px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:600;
}

.btn-primary{
background:var(--primary);
color:white;
width:100%;
}

.btn-danger{
background:#FEE2E2;
color:var(--danger);
}

.sale{
background:#F8FAFC;
padding:15px;
border-radius:15px;
margin-bottom:12px;
border-left:5px solid var(--primary);
}

.footer{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
padding:18px;
box-shadow:0 -6px 20px rgba(0,0,0,0.08);
display:flex;
justify-content:space-between;
align-items:center;
}

.total{
font-size:18px;
font-weight:700;
color:var(--primary);
}
</style>
</head>

<body>

<header>
<h1>Cantina do Terceirão 2026</h1>
<p>Controle de Vendas</p>

<nav>
<button onclick="mostrarTela('vendas')" id="btnVendas" class="active">Vendas</button>
<button onclick="mostrarTela('relatorios')" id="btnRelatorios">Relatórios</button>
</nav>
</header>

<div id="telaVendas">
<div class="container">

<div class="card">
<h2>Nova Venda</h2>

<label>Data</label>
<div class="flex">
<input type="date" id="dataVenda">

<select id="periodo" style="max-width:150px;">
<option value="Manhã">Manhã</option>
<option value="Almoço">Almoço</option>
<option value="Tarde">Tarde</option>
</select>
</div>

<label>Cliente</label>
<div class="flex">
<input type="text" id="nome" placeholder="Nome do cliente">
<select id="sala" style="max-width:100px;">
<option value="">Sala</option>
<option>1W</option><option>2W</option><option>3W</option>
<option>1X</option><option>2X</option><option>3X</option>
<option>1Y</option><option>2Y</option><option>3Y</option>
</select>
</div>

<label>Produto</label>
<select id="produto">
<option value="0">Selecione...</option>

<option value="0">Bebidas</option>
<option value="3.50">Refrigerante - R$3,50</option>
<option value="2.00">Suco - R$2,00</option>

<option value="0">Doces</option>  
<option value="2.50">Freegells - R$2,50</option>
<option value="1.00">Paçoca - R$1,00</option>
<option value="1.00">Ciclete - R$1,00</option>  
<option value="2.50">Moranguete - R$2,50</option>  
<option value="3.00">Trufa - R$3,00</option>  
<option value="0.50">Bala 7Belo - R$0,50</option>
<option value="1.00">Pirulito - R$1,00</option>  
<option value="1.00">Geladinho - R$1,00</option>

<option value="0">Salgadinhos</option>  
<option value="3.50">Salgado Fofura - R$3,50</option>
<option value="1.50">Pipoca Vovozinha - R$1,50</option>  

<option value="0">Salgados</option>  
<option value="7.50">Salgado Menor - R$7,50</option>
<option value="9.00">Salgado Medio - R$9,00</option>
<option value="12.00">Salgado Grande - R$12,00</option>
  
  
</select>

<label>Forma de Pagamento</label>
<select id="forma">
<option value="avista">Dinheiro</option>
<option value="pix">Pix</option>
<option value="cartao">Cartão</option>
<option value="fiado">Fiado (14 dias)</option>
</select>

<button class="btn-primary" onclick="registrarVenda()">Registrar Venda</button>
</div>

<div class="card">
<h2>Vendas do Dia</h2>
<div id="lista"></div>
</div>

</div>
</div>

<div class="footer">
<div class="total" id="totalDia">R$ 0,00</div>
<button class="btn-danger" onclick="limparDia()">Limpar Dia</button>
</div>

<script>

document.getElementById("dataVenda").value =
new Date().toISOString().split("T")[0];

function registrarVenda(){
let data=document.getElementById("dataVenda").value;
let periodo=document.getElementById("periodo").value;
let nome=document.getElementById("nome").value.trim();
let sala=document.getElementById("sala").value;
let produto=document.getElementById("produto");
let produtoNome=produto.options[produto.selectedIndex].text;
let valor=parseFloat(produto.value);
let forma=document.getElementById("forma").value;

if(!nome || !sala || valor==0){
alert("Preencha nome, sala e produto!");
return;
}

let venda={data,periodo,nome,sala,produto:produtoNome,valor,forma};

let vendas=JSON.parse(localStorage.getItem("vendas")||"[]");
vendas.push(venda);
localStorage.setItem("vendas",JSON.stringify(vendas));

document.getElementById("nome").value="";
document.getElementById("sala").value="";
document.getElementById("produto").value="0";

carregar();
}

function carregar(){
let lista=document.getElementById("lista");
lista.innerHTML="";
let total=0;
let dataSelecionada=document.getElementById("dataVenda").value;
let vendas=JSON.parse(localStorage.getItem("vendas")||"[]");

vendas.forEach((v)=>{
if(v.data==dataSelecionada){
total+=v.valor;

lista.innerHTML+=`
<div class="sale">
<strong>${v.nome} - ${v.sala}</strong><br>
<small>${v.produto}</small><br>
<small>Período: ${v.periodo}</small><br>
<small>Pagamento: ${v.forma.toUpperCase()}</small><br>
<strong>R$ ${v.valor.toFixed(2)}</strong>
</div>`;
}
});

document.getElementById("totalDia").innerText="R$ "+total.toFixed(2);
}

function limparDia(){
let dataSelecionada=document.getElementById("dataVenda").value;
if(confirm("Deseja limpar esse dia?")){
let vendas=JSON.parse(localStorage.getItem("vendas")||"[]");
vendas=vendas.filter(v=>v.data!=dataSelecionada);
localStorage.setItem("vendas",JSON.stringify(vendas));
carregar();
}
}

document.getElementById("dataVenda").addEventListener("change",carregar);
carregar();

</script>

</body>
</html>
